name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # --- Configurações de Layout ---
          user: PedroHMedd
          template: classic
          base: header, repositories, metadata # Mantém estrelas, commits e infos gerais de repo
          base_hierarchical: commits           # Organiza o header por relevância
          config_timezone: America/Sao_Paulo
          
          # --- O que REMOVER (Limpando o ruído) ---
          base_skipped: community, followers, following # Remove a parte de "rede social"

          # --- Plugin de Linguagens (Profissional) ---
          plugin_languages: yes
          plugin_languages_ignored: css, html, scss, less, shell # Foca no Back-end/Dados
          plugin_languages_limit: 6
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, lines-changed # Mostra o impacto real em linhas
          plugin_languages_threshold: 2%
          plugin_languages_analysis_timeout: 15
          
          # --- Plugin de Atividade Profissional ---
          plugin_lines: yes # Mostra quantas linhas de código você escreveu (métrica de peso)
